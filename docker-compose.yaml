version: '3'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: moviePoster_db
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  kafka:
    image: apache/kafka:3.7.0
    ports: ["9092:9092"]
  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports: ["9200:9200"]